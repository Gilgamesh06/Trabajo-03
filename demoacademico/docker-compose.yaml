services:

  app:
    image: demoacademico
    container_name: demoacademico-app
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: demoacademico-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demoacademico
      MYSQL_USER: demo
      MYSQL_PASSWORD: demo123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: